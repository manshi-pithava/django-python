{% extends 'core_templates/base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex p-3 justify-content-center " style="min-height: 60vh;">
    <div class="glass p-3" style="width: 500px;">
        <h2 class="text-center text-primary">Login</h2>
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-custom btn-secondary w-100">Login</button>
        </form>

        <p class="mt-3 text-center">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-primary">Register</a>
        </p>
    </div>
</div>
{% endblock %}
