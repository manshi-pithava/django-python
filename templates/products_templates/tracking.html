{% extends 'core_templates/base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center">Order Tracking - #{{ order.id }}</h2>

    <div class="card p-4">
        <p><strong>Placed On:</strong> {{ order.created_at|date:"d M Y, H:i" }}</p>
        <p><strong>Total Amount:</strong> ₹{{ order.total_price }}</p>
        <p><strong>Status:</strong>
            <span class="badge
                {% if order.status == 'Pending' %} badge-warning
                {% elif order.status == 'Shipped' %} badge-primary
                {% elif order.status == 'Delivered' %} badge-success
                {% else %} badge-secondary
                {% endif %}">
                {{ order.status }}
            </span>
        </p>

        <!-- ✅ Progress bar with correct syntax -->
        <div class="progress">
            <div class="progress-bar
                {% if order.status == 'Pending' %} bg-warning
                {% elif order.status == 'Shipped' %} bg-primary
                {% elif order.status == 'Delivered' %} bg-success
                {% endif %}"
                role="progressbar"
                style="width:
                    {% if order.status == 'Pending' %} 30%
                    {% elif order.status == 'Shipped' %} 70%
                    {% elif order.status == 'Delivered' %} 100%
                    {% endif %};"
                aria-valuenow="50"
                aria-valuemin="0"
                aria-valuemax="100">
            </div>
        </div>
    </div>
</div>
{% endblock %}
