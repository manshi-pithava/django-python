{% extends 'core_templates/base.html' %}
{% load static %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass p-4">
                <h2 class="text-center text-primary">Checkout</h2>
                <form method="POST" action="{% url 'payment' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Payment Method</label>
                        <select name="payment_method" class="form-select" id="payment-method" required>
                            <option value="cod">Cash on Delivery</option>
                            <option value="fake_payment">Online Payment</option>
                        </select>
                    </div>

                    <!-- Fake Payment Fields (Initially Hidden) -->
                    <div id="fake-payment-section" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">CARD NUMBER</label>
                            <input type="text" name="card_number" class="form-control" placeholder="xxxx xxxx xxxx xxxx">
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label">MONTH</label>
                                <input type="text" name="exp_month" class="form-control" placeholder="MM">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">YEAR</label>
                                <input type="text" name="exp_year" class="form-control" placeholder="YY">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">CV CODE</label>
                                <input type="password" name="cvv" class="form-control" placeholder="CV">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="proceed-button" class="btn btn-primary w-100 mt-3">Proceed to Payment</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("payment-method").addEventListener("change", function() {
        var paymentSection = document.getElementById("fake-payment-section");
        if (this.value === "fake_payment") {
            paymentSection.style.display = "block";
        } else {
            paymentSection.style.display = "none";
        }
    });
</script>
{% endblock %}
